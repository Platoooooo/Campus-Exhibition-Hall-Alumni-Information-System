server:
  port: 8080

spring:
  application:
    name: campus-exhibition
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/campus_exhibition?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis123}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
  jackson:
    date-format: yyyy-MM-dd'T'HH:mm:ss.SSSXXX
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 文件上传配置
app:
  upload:
    base-dir: ./uploads
    max-image-size: 10485760     # 10MB
    max-video-size: 104857600    # 100MB
    max-doc-size: 20971520       # 20MB
  face:
    service-url: ${FACE_SERVICE_URL:http://localhost:8000}
    quality-threshold: 0.6
    encrypt-key: ${FACE_ENCRYPT_KEY:change-me-in-production}
    store-original-image: false
  cache:
    screen-carousel-ttl-minutes: ${SCREEN_CACHE_TTL:5}  # 大屏轮播缓存 TTL（分钟），设为 0 则禁用缓存
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-use-256-bit-key}
    expiration-ms: 86400000
