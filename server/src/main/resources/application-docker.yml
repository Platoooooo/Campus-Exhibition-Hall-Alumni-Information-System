# Docker Compose 环境专用配置
# 激活方式：SPRING_PROFILES_ACTIVE=docker
spring:
  datasource:
    url: jdbc:mysql://mysql:3306/campus_exhibition?useUnicode=true&characterEncoding=utf8mb4&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
  data:
    redis:
      host: redis
      port: 6379
      password: ${REDIS_PASSWORD:redis123}

app:
  face:
    service-url: ${FACE_SERVICE_URL:http://host.docker.internal:8000}
    encrypt-key: ${FACE_ENCRYPT_KEY:change-me-in-production}
