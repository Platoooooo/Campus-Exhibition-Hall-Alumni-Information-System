name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ===================== 后端测试 =====================
  backend-test:
    name: Backend Tests (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [17]
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: maven

      - name: Run tests
        run: mvn test -B --no-transfer-progress

  # ===================== 管理后台测试 =====================
  admin-web-test:
    name: Admin Web Tests (Node 20)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin-web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: admin-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

  # ===================== 大屏展示端测试 =====================
  screen-web-test:
    name: Screen Web Tests (Node 20)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: screen-web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: screen-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test
